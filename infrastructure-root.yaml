---
# AppOfApps — ArgoCD pulls Application CRDs from Git and enforces sync-wave ordering.
#
# Wave ordering (ArgoCD waits for each wave to be Healthy before advancing):
#   wave 0 → longhorn             ← gates everything; PVCs won't bind until this is Healthy
#   wave 1 → metallb, cert-manager
#   wave 2 → prometheus-stack, seaweedfs, ingress, capi-operator
#   wave 3 → loki, alloy, cortex
#
# To apply: kubectl apply -f gitops/infrastructure-root.yaml
# After that, ArgoCD owns all ordering — no shell intervention needed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/abhilash-armada-ai/gitops
    targetRevision: HEAD
    path: infrastructure
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

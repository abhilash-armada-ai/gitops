---
# SealedSecret — armada-registry Docker Hub imagePullSecret
# Encrypted with cluster-wide scope: same ciphertext works in any namespace.
# Generated with: kubeseal --scope=cluster-wide
# Source: docker.io, username: amcop
#
# Applied to all namespaces that pull from docker.io/amcop/*
# To add a new namespace: copy one block below, change metadata.namespace only.

# ── amcop-system ──────────────────────────────────────────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
  name: armada-registry
  namespace: amcop-system
spec:
  encryptedData:
    .dockerconfigjson: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
      name: armada-registry
      namespace: amcop-system
    type: kubernetes.io/dockerconfigjson
---

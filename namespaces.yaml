---
# All namespaces required by Armada Bridge
# Applied before any Application sync (wave -10)
apiVersion: v1
kind: Namespace
metadata:
  name: amcop-system
  labels:
    app.kubernetes.io/managed-by: argocd
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/managed-by: argocd
---
apiVersion: v1
kind: Namespace
metadata:
  name: cortex
  labels:
    app.kubernetes.io/managed-by: argocd
---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    app.kubernetes.io/managed-by: argocd
---
# Pre-create the ServiceAccount required by Longhorn's pre-upgrade Helm hook.
# ArgoCD runs pre-upgrade hooks on every sync (unlike plain helm install which skips them),
# so this SA must exist before the Longhorn Application first syncs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-service-account
  namespace: longhorn-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    app.kubernetes.io/managed-by: argocd
---
apiVersion: v1

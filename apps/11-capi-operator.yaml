---
# Cluster API Operator
# Chart: https://operator.cluster.x-k8s.io/  version: 0.26.0
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capi-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://operator.cluster.x-k8s.io/
    chart: cluster-api-operator
    targetRevision: 0.26.0
    helm:
      values: |
        image:
          manager:
            repository: "docker.io/amcop/cluster-api-operator"
        bootstrap:
          kubeadm:
            deployment:
              imagePullSecrets:
                - name: armada-registry
              containers:
                - name: manager
                  imageUrl: "docker.io/amcop/kubeadm-bootstrap-controller:v1.12.4"
            manager:
              featureGates:
                KubeadmBootstrapFormatIgnition: false
        core:
          cluster-api:
            deployment:
              imagePullSecrets:
                - name: armada-registry
              containers:
                - name: manager
                  imageUrl: "docker.io/amcop/cluster-api-controller:v1.12.4"
            manager:
              featureGates:
                MachineSetPreflightChecks: true
                MachineWaitForVolumeDetachConsiderVolumeAttachments: true
  destination:
    server: https://kubernetes.default.svc
    namespace: capi-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

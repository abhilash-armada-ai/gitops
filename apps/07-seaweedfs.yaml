---
# SeaweedFS — object storage (S3-compatible), used by Loki and Cortex
# Chart: https://seaweedfs.github.io/seaweedfs/helm  version: 4.17.0
# S3 credentials are AUTO-GENERATED by the chart into Secret 'seaweedfs-s3-secret'.
# After sync, extract credentials for Loki:
#   kubectl get secret -n seaweedfs seaweedfs-s3-secret -o jsonpath='{.data.admin_access_key_id}' | base64 -d
#   kubectl get secret -n seaweedfs seaweedfs-s3-secret -o jsonpath='{.data.admin_secret_access_key}' | base64 -d
# Then update the loki Application with those values.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seaweedfs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://seaweedfs.github.io/seaweedfs/helm
    chart: seaweedfs
    targetRevision: 4.17.0
    helm:
      values: |
        master:
          data:
            type: "persistentVolumeClaim"
            size: "1Gi"
            storageClass: ""
        volume:
          dataDirs:
            - name: data1
              type: "persistentVolumeClaim"
              size: "50Gi"
              storageClass: ""
              maxVolumes: 0
        filer:
          data:
            type: "persistentVolumeClaim"
            size: "5Gi"
            storageClass: ""
          s3:
            enabled: true
            enableAuth: true
            createBuckets:
              - name: cortex-blocks
                anonymousRead: false
              - name: loki-chunks
                anonymousRead: false
        s3:
          ingress:
            enabled: true
            className: nginx
            host: false
            path: /
            pathType: Prefix
            annotations:
              nginx.ingress.kubernetes.io/proxy-body-size: "0"
              nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
              nginx.ingress.kubernetes.io/rewrite-target: /
              nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: seaweedfs
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# AppOfApps — ArgoCD pulls Application CRDs from Git and enforces sync-wave ordering.
#
# Wave ordering (ArgoCD waits for each wave to be Healthy before advancing):
#   wave 1 → kamaji
#   wave 2 → opa
#   wave 3 → keycloak
#   wave 4 → amcop-apps
#
# To apply: kubectl apply -f gitops/platform-root.yaml
# After that, ArgoCD owns all ordering — no shell intervention needed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/abhilash-armada-ai/gitops
    targetRevision: HEAD
    path: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

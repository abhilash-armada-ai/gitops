---
# Root Application — the ONLY resource applied manually, once, to bootstrap.
#
# Single-level AppOfApps: ArgoCD watches apps/ and enforces wave ordering
# across ALL infrastructure and platform apps in one sync:
#
#   wave 0  → longhorn                                    (storage first)
#   wave 1  → metallb, cert-manager
#   wave 2  → prometheus, seaweedfs, ingress, capi-operator
#   wave 3  → loki, alloy, cortex
#   wave 10 → kamaji                                      (platform starts only after all infra Healthy)
#   wave 11 → opa
#   wave 12 → keycloak
#   wave 13 → amcop-apps
#
# Apply once:
#   kubectl apply -f root.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abhilash-armada-ai/gitops
    targetRevision: HEAD
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false      # Safety: never auto-delete AppOfApps from Git removals
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
